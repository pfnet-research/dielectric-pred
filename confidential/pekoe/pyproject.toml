[tool.black] # automatically generated by pysen
# pysen ignores and overwrites any modifications
line-length = 99
target-version = ["py38"]

[tool.isort] # automatically generated by pysen
# pysen ignores and overwrites any modifications
default_section = "THIRDPARTY"
ensure_newline_before_comments = true
force_grid_wrap = 0
force_single_line = false
include_trailing_comma = true
known_first_party = ["batch_calculate", "chicle", "diamond", "graphene_sheets", "iron_oxide_adsorp", "mep", "pekoe", "pfp", "teanet_conv_helper"]
line_length = 99
multi_line_output = 3
use_parentheses = true
