[flake8]
# automatically generated by pysen
# pysen ignores and overwrites any modifications
# e203: black treats : as a binary operator
# e231: black doesn't put a space after ,
# e501: black may exceed the line-length to follow other style rules
# w503 or w504: either one needs to be disabled to select w error codes
ignore = E203,E231,E501,W503
max-line-length = 99
select = B,B950,C,E,F,W

[mypy]
# automatically generated by pysen
# pysen ignores and overwrites any modifications
check_untyped_defs = True
disallow_any_decorated = False
disallow_any_generics = False
disallow_any_unimported = False
disallow_incomplete_defs = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_untyped_decorators = False
disallow_untyped_defs = True
ignore_errors = False
ignore_missing_imports = True
mypy_path = stubs
no_implicit_optional = True
python_version = 3.8
show_error_codes = True
strict_equality = True
strict_optional = True
warn_redundant_casts = True
warn_return_any = True
warn_unreachable = True
warn_unused_configs = True
warn_unused_ignores = False

[mypy-numpy.*]
# automatically generated by pysen
# pysen ignores and overwrites any modifications
follow_imports = skip
ignore_errors = True

[mypy-torch.*]
# automatically generated by pysen
# pysen ignores and overwrites any modifications
follow_imports = skip
ignore_errors = True

[mypy-pekoe.nn.models.onnx.*]
ignore_errors = True

[mypy-pekoe.nn.models.teanet.*]
ignore_errors = True

[mypy-pekoe.nn.models.teanet.polylog]
follow_imports = skip
ignore_errors = True

[mypy-pekoe.nn.models.teanet.teanet]
follow_imports = skip
ignore_errors = True

[mypy-pekoe.nn.models.teanet.teanet_conv]
follow_imports = skip
ignore_errors = True

[mypy-pekoe.nn.models.teanet.twobody]
follow_imports = skip
ignore_errors = True

